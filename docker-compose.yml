version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./anamnesis.db
      - APP_ENV=development
      - LOG_LEVEL=INFO
      - LOG_FORMAT=text
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_data:/app/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
